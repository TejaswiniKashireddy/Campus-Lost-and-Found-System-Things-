{% extends 'base.html' %}
{% block title %}Login — Campus L&F{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-ico">🎒</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your Campus Lost &amp; Found account</p>
    </div>
    <form method="POST" action="{{ url_for('login') }}">
      <div class="fg">
        <label>Username or Email</label>
        <div class="iw">
          <span class="ic">👤</span>
          <input type="text" name="identifier" placeholder="Enter username or email" required autofocus/>
        </div>
      </div>
      <div class="fg">
        <label>Password</label>
        <div class="iw">
          <span class="ic">🔑</span>
          <input type="password" name="password" placeholder="Enter your password" required/>
        </div>
      </div>
      <div class="mt-16">
        <button class="btn btn-primary btn-full btn-lg">Sign In →</button>
      </div>
    </form>
    <p class="text-muted text-sm mt-16" style="text-align:center">
      No account? <a href="{{ url_for('register') }}" style="font-weight:600">Create one free</a>
    </p>
  </div>
</div>
{% endblock %}
